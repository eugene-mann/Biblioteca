<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — The Tokyo Bookshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rice-paper: #F7F5F0;
      --ink: #1A1A1A;
      --stone: #888880;
      --vermilion: #C23B22;
      --matcha: #7A8B6F;
      --border: #D4D0C8;
      --font-display: 'EB Garamond', Georgia, serif;
      --font-body: 'Work Sans', -apple-system, sans-serif;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--rice-paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ========================================
       NAV
       ======================================== */
    nav {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 2.5rem 4rem;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 3rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--stone);
      text-decoration: none;
      position: relative;
      padding-bottom: 0.5rem;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--ink);
    }

    .nav-links a.active {
      color: var(--ink);
    }

    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--vermilion);
      border-radius: 50%;
    }

    /* ========================================
       MAIN CONTAINER
       ======================================== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4rem;
    }

    /* ========================================
       HERO — CURRENTLY READING
       ======================================== */
    .hero {
      padding: 5rem 0 4rem;
    }

    .hero-label {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--stone);
      margin-bottom: 2.5rem;
    }

    .hero-content {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding-left: 2rem;
    }

    .hero-cover {
      width: 140px;
      height: 200px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero-cover-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1.2rem;
    }

    .hero-cover-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: #fff;
      line-height: 1.3;
      opacity: 0.9;
    }

    .hero-separator {
      width: 2px;
      height: 40px;
      background: var(--vermilion);
      margin: 0.5rem 2.5rem 0 2.5rem;
      flex-shrink: 0;
    }

    .hero-text {
      padding-top: 0.25rem;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .hero-author {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.9rem;
      color: var(--stone);
      margin-bottom: 1.5rem;
    }

    .hero-progress {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.8rem;
      color: var(--stone);
      letter-spacing: 0.05em;
    }

    /* ========================================
       HORIZONTAL RULE
       ======================================== */
    .divider {
      width: 60%;
      height: 1px;
      background: var(--border);
      border: none;
      margin: 0;
    }

    /* ========================================
       STATS
       ======================================== */
    .stats {
      padding: 2.5rem 0;
    }

    .stats-text {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.85rem;
      color: var(--stone);
      letter-spacing: 0.04em;
    }

    .stats-text span {
      margin: 0 0.75rem;
      opacity: 0.4;
    }

    /* ========================================
       SEARCH
       ======================================== */
    .search-section {
      padding: 2rem 0 2.5rem;
    }

    .search-input {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.85rem;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0;
      width: 50%;
      outline: none;
      letter-spacing: 0.04em;
      transition: border-color 0.3s ease;
    }

    .search-input::placeholder {
      color: var(--stone);
      opacity: 0.6;
    }

    .search-input:focus {
      border-bottom-color: var(--ink);
    }

    /* ========================================
       FILTERS
       ======================================== */
    .filters {
      display: flex;
      gap: 3.5rem;
      padding: 1.5rem 0 3.5rem;
    }

    .filter-btn {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--stone);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      padding: 0;
      padding-top: 1rem;
      transition: color 0.3s ease;
    }

    .filter-btn:hover {
      color: var(--ink);
    }

    .filter-btn.active {
      color: var(--ink);
    }

    .filter-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--vermilion);
      border-radius: 50%;
    }

    /* ========================================
       BOOK GRID
       ======================================== */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3rem;
      padding-bottom: 2rem;
    }

    .book-grid-row-border {
      grid-column: 1 / -1;
      height: 1px;
      background: var(--border);
    }

    .book-item {
      transition: opacity 0.3s ease;
    }

    .book-item:hover {
      opacity: 0.85;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3 / 4.2;
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1.2rem;
      margin-bottom: 1rem;
      cursor: default;
    }

    .book-cover-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: #fff;
      line-height: 1.3;
      opacity: 0.85;
    }

    .book-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .book-author {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.78rem;
      color: var(--stone);
      margin-bottom: 0.5rem;
    }

    .book-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .book-status {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }

    .book-status.reading {
      color: var(--matcha);
    }

    .book-status.read {
      color: var(--stone);
    }

    .book-status.want_to_read {
      color: var(--stone);
      opacity: 0.6;
    }

    .book-rating {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .rating-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--vermilion);
    }

    .rating-dot.empty {
      background: var(--border);
    }

    /* ========================================
       QUOTE CARD (position 7 in grid)
       ======================================== */
    .quote-card {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      border: 1px solid var(--border);
      aspect-ratio: 3 / 4.2;
    }

    .quote-text {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--stone);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      max-height: 100%;
      overflow: hidden;
    }

    .quote-attribution {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.65rem;
      color: var(--border);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      margin-left: 1.5rem;
      letter-spacing: 0.1em;
    }

    /* ========================================
       FOOTER
       ======================================== */
    footer {
      padding: 4rem 4rem 3rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    .footer-text {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.06em;
    }

    /* ========================================
       RESPONSIVE — TABLET
       ======================================== */
    @media (max-width: 1024px) {
      nav {
        padding: 2rem 3rem;
      }

      .container {
        padding: 0 3rem;
      }

      .book-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 2.5rem;
      }

      .hero-title {
        font-size: 1.8rem;
      }

      footer {
        padding: 3rem 3rem 2.5rem;
      }
    }

    /* ========================================
       RESPONSIVE — MOBILE
       ======================================== */
    @media (max-width: 768px) {
      nav {
        padding: 1.5rem 2rem;
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start;
      }

      .nav-links {
        gap: 2rem;
      }

      .container {
        padding: 0 2rem;
      }

      .hero {
        padding: 3.5rem 0 3rem;
      }

      .hero-content {
        flex-direction: column;
        padding-left: 0;
        gap: 1.5rem;
      }

      .hero-separator {
        width: 40px;
        height: 2px;
        margin: 0;
      }

      .hero-title {
        font-size: 1.6rem;
      }

      .search-input {
        width: 100%;
      }

      .filters {
        gap: 2rem;
        flex-wrap: wrap;
      }

      .book-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .book-cover {
        aspect-ratio: 3 / 3.5;
      }

      .quote-card {
        aspect-ratio: auto;
        min-height: 200px;
      }

      footer {
        padding: 3rem 2rem 2rem;
      }
    }

    /* ========================================
       ANIMATIONS — SUBTLE ENTRANCE
       ======================================== */
    .fade-in {
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .book-item:nth-child(1) { animation-delay: 0.05s; }
    .book-item:nth-child(2) { animation-delay: 0.1s; }
    .book-item:nth-child(3) { animation-delay: 0.15s; }
    .book-item:nth-child(4) { animation-delay: 0.2s; }
    .book-item:nth-child(5) { animation-delay: 0.25s; }
    .book-item:nth-child(6) { animation-delay: 0.3s; }
    .book-item:nth-child(7) { animation-delay: 0.35s; }
    .book-item:nth-child(8) { animation-delay: 0.4s; }
    .book-item:nth-child(9) { animation-delay: 0.45s; }

    /* Hidden state for filtered items */
    .book-item.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="wordmark">Biblioteca</a>
    <ul class="nav-links">
      <li><a href="#" class="active">library</a></li>
      <li><a href="#">discover</a></li>
      <li><a href="#">lists</a></li>
      <li><a href="#">settings</a></li>
    </ul>
  </nav>

  <div class="container">

    <!-- HERO -->
    <section class="hero">
      <p class="hero-label">currently reading</p>
      <div class="hero-content">
        <div class="hero-cover">
          <div class="hero-cover-inner" style="background-color: #4A6FA5;">
            <span class="hero-cover-title">The Midnight Library</span>
          </div>
        </div>
        <div class="hero-separator"></div>
        <div class="hero-text">
          <h1 class="hero-title">The Midnight Library</h1>
          <p class="hero-author">Matt Haig</p>
          <p class="hero-progress">page 198 of 318</p>
        </div>
      </div>
    </section>

    <!-- DIVIDER -->
    <hr class="divider">

    <!-- STATS -->
    <section class="stats">
      <p class="stats-text">487 books<span>&middot;</span>312 read<span>&middot;</span>23 reading</p>
    </section>

    <!-- SEARCH -->
    <section class="search-section">
      <input type="text" class="search-input" placeholder="search" id="searchInput">
    </section>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="reading">reading</button>
      <button class="filter-btn" data-filter="read">read</button>
      <button class="filter-btn" data-filter="want_to_read">want to read</button>
    </div>

    <!-- BOOK GRID -->
    <div class="book-grid" id="bookGrid"></div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-text">Biblioteca, 2024</p>
  </footer>

  <script>
    const books = [
      { title: "The Midnight Library", author: "Matt Haig", color: "#4A6FA5", status: "reading", rating: 4 },
      { title: "Sapiens", author: "Yuval Noah Harari", color: "#8B6F47", status: "reading", rating: 5 },
      { title: "Atomic Habits", author: "James Clear", color: "#2D8B57", status: "read", rating: 5 },
      { title: "Dune", author: "Frank Herbert", color: "#C4783E", status: "read", rating: 4 },
      { title: "Meditations", author: "Marcus Aurelius", color: "#6B5B73", status: "read", rating: 5 },
      { title: "The Alchemist", author: "Paulo Coelho", color: "#4A6FA5", status: "want_to_read", rating: 3 },
      { title: "Thinking, Fast and Slow", author: "Daniel Kahneman", color: "#7A5C8A", status: "read", rating: 4 },
      { title: "1984", author: "George Orwell", color: "#4A6FA5", status: "read", rating: 5 },
      { title: "Educated", author: "Tara Westover", color: "#8B6F47", status: "read", rating: 4 },
      { title: "The Design of Everyday Things", author: "Don Norman", color: "#C95D63", status: "want_to_read", rating: 0 },
      { title: "Shoe Dog", author: "Phil Knight", color: "#8B6F47", status: "read", rating: 4 },
      { title: "Project Hail Mary", author: "Andy Weir", color: "#C4783E", status: "want_to_read", rating: 0 },
      { title: "The Remains of the Day", author: "Kazuo Ishiguro", color: "#4A6FA5", status: "read", rating: 5 },
      { title: "Creativity, Inc.", author: "Ed Catmull", color: "#2D8B57", status: "read", rating: 4 },
      { title: "The Gene", author: "Siddhartha Mukherjee", color: "#3A7CA5", status: "want_to_read", rating: 0 },
      { title: "Kitchen Confidential", author: "Anthony Bourdain", color: "#8B6F47", status: "reading", rating: 4 },
      { title: "Algorithms to Live By", author: "Brian Christian", color: "#3A7CA5", status: "read", rating: 3 },
      { title: "Normal People", author: "Sally Rooney", color: "#4A6FA5", status: "read", rating: 4 },
      { title: "The Innovator's Dilemma", author: "Clayton Christensen", color: "#2D8B57", status: "read", rating: 4 },
      { title: "When Breath Becomes Air", author: "Paul Kalanithi", color: "#8B6F47", status: "read", rating: 5 }
    ];

    const quote = {
      text: "A reader lives a thousand lives before he dies. The man who never reads lives only one.",
      author: "George R.R. Martin"
    };

    let currentFilter = "all";

    function statusLabel(status) {
      if (status === "reading") return "reading";
      if (status === "read") return "read";
      if (status === "want_to_read") return "want to read";
      return status;
    }

    function createRatingDots(rating) {
      if (rating === 0) return "";
      let html = '<div class="book-rating">';
      for (let i = 0; i < 5; i++) {
        html += `<div class="rating-dot${i < rating ? '' : ' empty'}"></div>`;
      }
      html += '</div>';
      return html;
    }

    function createBookCard(book, index) {
      const div = document.createElement("div");
      div.className = "book-item fade-in";
      div.dataset.status = book.status;
      div.dataset.title = book.title.toLowerCase();
      div.dataset.author = book.author.toLowerCase();
      div.style.animationDelay = `${index * 0.05}s`;

      div.innerHTML = `
        <div class="book-cover" style="background-color: ${book.color};">
          <span class="book-cover-title">${book.title}</span>
        </div>
        <h3 class="book-title">${book.title}</h3>
        <p class="book-author">${book.author}</p>
        <div class="book-meta">
          <span class="book-status ${book.status}">${statusLabel(book.status)}</span>
          ${createRatingDots(book.rating)}
        </div>
      `;
      return div;
    }

    function createQuoteCard(index) {
      const div = document.createElement("div");
      div.className = "book-item fade-in";
      div.dataset.status = "all";
      div.dataset.title = "";
      div.dataset.author = "";
      div.style.animationDelay = `${index * 0.05}s`;

      div.innerHTML = `
        <div class="quote-card">
          <p class="quote-text">${quote.text}</p>
          <span class="quote-attribution">${quote.author}</span>
        </div>
      `;
      return div;
    }

    function renderGrid(filteredBooks) {
      const grid = document.getElementById("bookGrid");
      grid.innerHTML = "";

      let bookIndex = 0;
      let gridPosition = 0;

      while (bookIndex < filteredBooks.length) {
        // Insert row border after every 3 items (except before the first row)
        if (gridPosition > 0 && gridPosition % 3 === 0) {
          const border = document.createElement("div");
          border.className = "book-grid-row-border";
          grid.appendChild(border);
        }

        // Position 6 (0-indexed) gets the quote card if showing all
        if (gridPosition === 6 && currentFilter === "all") {
          grid.appendChild(createQuoteCard(gridPosition));
          gridPosition++;
          continue;
        }

        grid.appendChild(createBookCard(filteredBooks[bookIndex], gridPosition));
        bookIndex++;
        gridPosition++;
      }
    }

    function applyFilter(filter) {
      currentFilter = filter;
      let filtered = books;
      if (filter !== "all") {
        filtered = books.filter(b => b.status === filter);
      }

      const searchTerm = document.getElementById("searchInput").value.toLowerCase().trim();
      if (searchTerm) {
        filtered = filtered.filter(b =>
          b.title.toLowerCase().includes(searchTerm) ||
          b.author.toLowerCase().includes(searchTerm)
        );
      }

      renderGrid(filtered);
    }

    // Filter buttons
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilter(btn.dataset.filter);
      });
    });

    // Search
    document.getElementById("searchInput").addEventListener("input", () => {
      applyFilter(currentFilter);
    });

    // Initial render
    renderGrid(books);
  </script>

</body>
</html>
